  <symbol id="brand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="2.2" fill="currentColor"/>
    <circle cx="5"  cy="5"  r="1.4"/>
    <circle cx="19" cy="5"  r="1.4"/>
    <circle cx="5"  cy="19" r="1.4"/>
    <circle cx="19" cy="19" r="1.4"/>
    <path d="M10.5 10.5L6 6M13.5 10.5L18 6M10.5 13.5L6 18M13.5 13.5L18 18" opacity="0.7"/>
