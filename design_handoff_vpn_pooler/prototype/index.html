<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VPN Pooler — IP Pool Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" onerror="this.remove()">
<style>
/* --- tokens --- */
:root {
  --bg: #0b0c0e;
  --bg-1: #101215;
  --bg-2: #15181c;
  --bg-3: #1b1f24;
  --line: #23272e;
  --line-2: #2d323a;
  --fg: #ececed;
  --fg-2: #c0c3c9;
  --mut: #8a8f98;
  --mut-2: #5c6068;
  --accent-h: 190;
  --accent: oklch(0.82 0.13 var(--accent-h));
  --accent-dim: oklch(0.82 0.13 var(--accent-h) / 0.18);
  --accent-ink: #04121a;
  --ok: oklch(0.78 0.15 150);
  --warn: oklch(0.82 0.13 80);
  --bad: oklch(0.72 0.18 25);
  --radius: 8px;
  --radius-s: 5px;
  --density: 1;
  --row-h: calc(36px * var(--density));
  --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

body.light {
  --bg: #f7f7f6;
  --bg-1: #ffffff;
  --bg-2: #fbfbfa;
  --bg-3: #f1f1ef;
  --line: #e6e6e3;
  --line-2: #d6d6d2;
  --fg: #111214;
  --fg-2: #2a2c30;
  --mut: #6b6f76;
  --mut-2: #9ea2a9;
  --accent-ink: #04121a;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--fg);
  font-size: 13px;
  line-height: 1.45;
  font-feature-settings: 'ss01', 'cv11';
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overflow-x: hidden;
}

/* subtle graph-paper backdrop */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    linear-gradient(to right, color-mix(in oklch, var(--line) 40%, transparent) 1px, transparent 1px) 0 0/32px 32px,
    linear-gradient(to bottom, color-mix(in oklch, var(--line) 40%, transparent) 1px, transparent 1px) 0 0/32px 32px;
  mask-image: radial-gradient(ellipse at 30% 0%, #000 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

button, input, select, textarea { font: inherit; color: inherit; }
button { cursor: pointer; background: none; border: 0; padding: 0; }
a { color: inherit; text-decoration: none; }

/* --- layout --- */
.app {
  display: grid;
  grid-template-columns: auto 1fr;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

/* --- sidebar --- */
.side {
  width: 232px;
  border-right: 1px solid var(--line);
  background: color-mix(in oklch, var(--bg-1) 80%, transparent);
  backdrop-filter: blur(10px);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  transition: width 180ms ease;
}
body.collapsed .side { width: 60px; }
body.collapsed .side-label,
body.collapsed .side-section,
body.collapsed .count,
body.collapsed .kbd,
body.collapsed .side-foot .meta,
body.collapsed .side-brand .brand-sub,
body.collapsed .side-brand .brand-text { display: none; }
body.collapsed .side-brand { justify-content: center; padding: 16px 0 8px; }
body.collapsed .side-link { justify-content: center; padding: 8px; gap: 0; }

.side-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px;
  border-bottom: 1px solid var(--line);
  min-height: 56px;
}
.brand-mark {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent) 0%, color-mix(in oklch, var(--accent) 55%, var(--bg)) 100%);
  color: var(--accent-ink);
  display: grid; place-items: center;
  flex-shrink: 0;
  position: relative;
  box-shadow: 0 0 0 1px color-mix(in oklch, var(--accent) 40%, transparent), inset 0 1px 0 color-mix(in oklch, #fff 20%, transparent);
}
.brand-mark svg { width: 16px; height: 16px; }
.brand-text { font-weight: 600; font-size: 13.5px; letter-spacing: -0.01em; display: flex; flex-direction: column; line-height: 1.2; }
.brand-sub { font-size: 10px; color: var(--mut); font-family: var(--mono); font-weight: 400; }

.side-nav { padding: 12px 8px; flex: 1; overflow: auto; }
.side-section {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--mut-2);
  padding: 10px 8px 4px;
  font-weight: 500;
}
.side-link {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 8px;
  border-radius: 6px;
  color: var(--fg-2);
  font-size: 13px;
  font-weight: 450;
  position: relative;
  transition: background 100ms, color 100ms;
  cursor: pointer;
}
.side-link:hover { background: var(--bg-3); color: var(--fg); }
.side-link.active { background: var(--bg-3); color: var(--fg); }
.side-link.active::before {
  content: '';
  position: absolute; left: -8px; top: 8px; bottom: 8px; width: 2px;
  background: var(--accent);
  border-radius: 2px;
}
.side-link .ico { width: 16px; height: 16px; flex-shrink: 0; color: var(--mut); }
.side-link.active .ico { color: var(--fg); }
.side-link .kbd { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--mut); letter-spacing: 0.02em; padding: 1px 5px; border: 1px solid var(--line); border-radius: 4px; background: var(--bg-2); }
.side-link .count {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--mut);
  padding: 1px 5px;
  background: var(--bg-3);
  border: 1px solid var(--line);
  border-radius: 4px;
}

.side-foot {
  border-top: 1px solid var(--line);
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), color-mix(in oklch, var(--accent) 40%, var(--bg)));
  display: grid; place-items: center;
  font-size: 11px; font-weight: 600; color: var(--accent-ink);
  flex-shrink: 0;
}
.side-foot .meta { display: flex; flex-direction: column; line-height: 1.25; min-width: 0; flex: 1; }
.side-foot .meta b { font-size: 12px; font-weight: 500; }
.side-foot .meta span { font-size: 10.5px; color: var(--mut); font-family: var(--mono); text-overflow: ellipsis; overflow: hidden; }

/* --- main --- */
.main { min-width: 0; display: flex; flex-direction: column; }

.topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 24px;
  min-height: 52px;
  border-bottom: 1px solid var(--line);
  background: color-mix(in oklch, var(--bg) 85%, transparent);
  backdrop-filter: blur(10px);
  position: sticky; top: 0; z-index: 20;
}
.crumbs { display: flex; align-items: center; gap: 6px; font-size: 13px; }
.crumbs .sep { color: var(--mut-2); }
.crumbs .cur { font-weight: 500; }
.crumbs .ghost { color: var(--mut); }
.crumbs .mono { font-family: var(--mono); }

.topbar .spacer { flex: 1; }

.search {
  display: flex; align-items: center;
  gap: 8px;
  padding: 5px 10px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--bg-1);
  color: var(--mut);
  font-size: 12px;
  min-width: 260px;
  cursor: pointer;
  transition: border-color 100ms;
}
.search:hover { border-color: var(--line-2); }
.search .ico { width: 14px; height: 14px; }
.search .kbd {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10.5px;
  padding: 1px 5px;
  border: 1px solid var(--line);
  border-radius: 3px;
  background: var(--bg-2);
}

.env-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 8px 3px 6px;
  border: 1px solid var(--line);
  border-radius: 5px;
  font-size: 11.5px;
  font-family: var(--mono);
  color: var(--fg-2);
  background: var(--bg-1);
}
.env-pill .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--ok);
  box-shadow: 0 0 0 2px color-mix(in oklch, var(--ok) 20%, transparent);
}

/* --- content --- */
.content {
  padding: 24px;
  max-width: 1400px;
  width: 100%;
}
body.dense { --density: 0.85; }

.page-head {
  display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
  margin-bottom: 20px;
}
.page-title {
  font-size: 22px; font-weight: 600; letter-spacing: -0.02em;
  display: flex; align-items: center; gap: 10px;
  margin: 0;
}
.page-title .mono-sub {
  font-family: var(--mono); font-size: 11.5px; color: var(--mut); font-weight: 400;
  padding: 3px 7px; background: var(--bg-2); border: 1px solid var(--line); border-radius: 4px;
}
.page-sub { color: var(--mut); font-size: 13px; margin-top: 4px; }
.page-actions { display: flex; gap: 8px; align-items: center; }

/* --- buttons --- */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 11px;
  border-radius: 6px;
  border: 1px solid var(--line);
  background: var(--bg-1);
  color: var(--fg);
  font-size: 12.5px;
  font-weight: 500;
  transition: background 100ms, border-color 100ms, color 100ms;
  white-space: nowrap;
}
.btn:hover { background: var(--bg-2); border-color: var(--line-2); }
.btn .ico { width: 13px; height: 13px; }
.btn.primary {
  background: var(--fg);
  color: var(--bg);
  border-color: var(--fg);
}
.btn.primary:hover { background: color-mix(in oklch, var(--fg) 85%, var(--bg)); }
.btn.accent {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--accent-ink);
}
.btn.accent:hover { filter: brightness(1.08); }
.btn.danger { color: var(--bad); }
.btn.danger:hover { background: color-mix(in oklch, var(--bad) 12%, var(--bg-1)); border-color: var(--bad); }
.btn.ghost { background: transparent; }
.btn.ghost:hover { background: var(--bg-2); }
.btn.sm { padding: 3px 8px; font-size: 11.5px; }
.btn .kbd {
  font-family: var(--mono); font-size: 10px;
  padding: 1px 4px; background: color-mix(in oklch, var(--bg) 30%, transparent);
  border-radius: 3px; border: 1px solid color-mix(in oklch, var(--line) 40%, transparent);
}

/* --- cards --- */
.card {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
}
.card-head {
  padding: 12px 16px;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  min-height: 44px;
}
.card-head h3 { margin: 0; font-size: 13px; font-weight: 600; letter-spacing: -0.005em; }
.card-head .sub { font-size: 11.5px; color: var(--mut); font-family: var(--mono); }
.card-body { padding: 16px; }
.card-body.flush { padding: 0; }

/* stat cards */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
}
.stat {
  background: var(--bg-1);
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 6px;
  position: relative;
}
.stat-label {
  font-size: 11px; color: var(--mut); text-transform: uppercase; letter-spacing: 0.07em;
  display: flex; align-items: center; gap: 6px;
}
.stat-value {
  font-size: 22px; font-weight: 500; letter-spacing: -0.02em;
  font-family: var(--mono);
}
.stat-delta {
  font-size: 11px;
  display: inline-flex; align-items: center; gap: 4px;
}
.stat-delta.up { color: var(--ok); }
.stat-delta.down { color: var(--bad); }
.stat-delta.flat { color: var(--mut); }

/* --- pool cards (dashboard) --- */
.pool-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 14px;
}
.pool-card {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: border-color 120ms, transform 120ms;
  display: flex; flex-direction: column; gap: 12px;
}
.pool-card:hover { border-color: var(--line-2); }
.pool-card .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.pool-card .name {
  font-size: 14px; font-weight: 600; letter-spacing: -0.005em;
  display: flex; align-items: center; gap: 8px;
}
.pool-card .cidr { font-family: var(--mono); font-size: 11.5px; color: var(--mut); }
.pool-card .big {
  font-family: var(--mono);
  font-size: 26px; font-weight: 500; letter-spacing: -0.03em;
  line-height: 1;
}
.pool-card .big .of { color: var(--mut-2); font-weight: 400; }
.pool-card .foot { display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--mut); font-family: var(--mono); }

/* subnet grid viz — hero viz for the redesign */
.subnet-viz {
  display: grid;
  gap: 2px;
  background: var(--bg-2);
  padding: 6px;
  border-radius: 4px;
  border: 1px solid var(--line);
}
.subnet-viz .cell {
  width: 100%;
  aspect-ratio: 1;
  background: var(--bg-3);
  border-radius: 1px;
  transition: background 120ms;
}
.subnet-viz .cell.used { background: var(--accent); }
.subnet-viz .cell.gw { background: var(--warn); }
.subnet-viz .cell.hover { outline: 1.5px solid var(--fg); outline-offset: 1px; z-index: 1; }

/* progress — thin linear */
.prog {
  height: 3px;
  background: var(--bg-3);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}
.prog > span {
  display: block; height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 300ms cubic-bezier(0.3, 0, 0, 1);
}
.prog.warn > span { background: var(--warn); }
.prog.bad > span { background: var(--bad); }

/* --- table --- */
.tbl {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 12.5px;
}
.tbl th {
  text-align: left;
  font-weight: 500;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--mut);
  padding: 8px 14px;
  border-bottom: 1px solid var(--line);
  background: var(--bg-2);
  white-space: nowrap;
}
.tbl th.sortable { cursor: pointer; user-select: none; }
.tbl th.sortable:hover { color: var(--fg); }
.tbl th .sort-ico { opacity: 0.4; margin-left: 4px; display: inline-block; width: 10px; }
.tbl th.sorted .sort-ico { opacity: 1; color: var(--accent); }
.tbl td {
  padding: 0 14px;
  height: var(--row-h);
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
  white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.tbl tbody tr { transition: background 80ms; }
.tbl tbody tr:hover { background: var(--bg-2); }
.tbl tbody tr.selected { background: color-mix(in oklch, var(--accent) 8%, transparent); }
.tbl .mono { font-family: var(--mono); font-size: 12px; }
.tbl .num { text-align: right; font-family: var(--mono); font-variant-numeric: tabular-nums; }

.filter-row th {
  padding: 6px 10px;
  background: var(--bg-1);
}
.filter-row input {
  width: 100%;
  border: 1px solid var(--line);
  background: var(--bg-2);
  color: var(--fg);
  padding: 3px 7px;
  border-radius: 4px;
  font-size: 11.5px;
  font-family: var(--mono);
}
.filter-row input:focus { outline: none; border-color: var(--accent); }

.tbl-foot {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 16px;
  border-top: 1px solid var(--line);
  font-size: 11.5px; color: var(--mut);
}
.tbl-foot .pager { display: flex; gap: 4px; align-items: center; }
.tbl-foot .pager button {
  width: 24px; height: 24px;
  border: 1px solid var(--line);
  border-radius: 4px;
  color: var(--fg-2);
  display: grid; place-items: center;
  background: var(--bg-1);
}
.tbl-foot .pager button:hover:not(:disabled) { border-color: var(--line-2); }
.tbl-foot .pager button.active { background: var(--bg-3); color: var(--fg); border-color: var(--line-2); }
.tbl-foot .pager button:disabled { opacity: 0.4; cursor: not-allowed; }

/* --- badges --- */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 1px 7px;
  border-radius: 4px;
  font-size: 11px;
  font-family: var(--mono);
  font-weight: 500;
  border: 1px solid var(--line);
  background: var(--bg-2);
  color: var(--fg-2);
  white-space: nowrap;
}
.badge.accent { color: var(--accent); border-color: color-mix(in oklch, var(--accent) 40%, var(--line)); background: var(--accent-dim); }
.badge.ok { color: var(--ok); border-color: color-mix(in oklch, var(--ok) 40%, var(--line)); background: color-mix(in oklch, var(--ok) 10%, transparent); }
.badge.warn { color: var(--warn); border-color: color-mix(in oklch, var(--warn) 40%, var(--line)); background: color-mix(in oklch, var(--warn) 10%, transparent); }
.badge.bad { color: var(--bad); border-color: color-mix(in oklch, var(--bad) 40%, var(--line)); background: color-mix(in oklch, var(--bad) 10%, transparent); }
.badge .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

/* --- forms --- */
.field { display: flex; flex-direction: column; gap: 5px; }
.field label {
  font-size: 11px; color: var(--mut); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500;
  display: flex; align-items: center; gap: 6px;
}
.field label .hint { text-transform: none; letter-spacing: 0; color: var(--mut-2); font-weight: 400; }
.input, .select {
  padding: 7px 10px;
  border: 1px solid var(--line);
  background: var(--bg-1);
  color: var(--fg);
  border-radius: 6px;
  font-size: 13px;
  font-family: var(--sans);
  transition: border-color 100ms;
  width: 100%;
}
.input.mono, .select.mono { font-family: var(--mono); font-size: 12px; }
.input:focus, .select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.select { appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path fill='none' stroke='%238a8f98' stroke-width='1.3' d='M3 5l3 3 3-3'/></svg>"); background-repeat: no-repeat; background-position: right 10px center; padding-right: 28px; }

.detail-grid {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 10px 20px;
}
.detail-grid dt { color: var(--mut); font-size: 12px; padding: 2px 0; }
.detail-grid dd { margin: 0; font-size: 13px; padding: 2px 0; }

/* --- command palette --- */
.palette-backdrop {
  position: fixed; inset: 0; z-index: 1000;
  background: color-mix(in oklch, #000 45%, transparent);
  backdrop-filter: blur(3px);
  display: grid; place-items: start center;
  padding-top: 12vh;
  animation: fade 120ms ease;
}
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
.palette {
  width: 580px; max-width: 92vw;
  background: var(--bg-1);
  border: 1px solid var(--line-2);
  border-radius: 10px;
  box-shadow: 0 30px 80px -10px rgba(0,0,0,0.6);
  overflow: hidden;
}
.palette-input {
  width: 100%;
  border: 0;
  background: transparent;
  padding: 14px 16px;
  font-size: 14px;
  color: var(--fg);
  border-bottom: 1px solid var(--line);
}
.palette-input:focus { outline: none; }
.palette-section {
  font-size: 10px; color: var(--mut-2); text-transform: uppercase; letter-spacing: 0.08em;
  padding: 8px 16px 4px;
}
.palette-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 16px;
  font-size: 13px;
  cursor: pointer;
}
.palette-item .ico { width: 15px; height: 15px; color: var(--mut); }
.palette-item.active { background: var(--bg-3); }
.palette-item.active .ico { color: var(--accent); }
.palette-item .kbd {
  margin-left: auto; font-family: var(--mono); font-size: 10.5px;
  padding: 1px 5px; background: var(--bg-2); border: 1px solid var(--line); border-radius: 3px;
  color: var(--mut);
}
.palette-empty { padding: 24px; text-align: center; color: var(--mut); font-size: 12.5px; }
.palette-foot {
  display: flex; gap: 14px; padding: 8px 16px;
  border-top: 1px solid var(--line);
  font-size: 11px; color: var(--mut); font-family: var(--mono);
}

function makeAllocations() {
  const out = [];
  // Pool 1 — heavy usage
  const base1 = 172 * 16777216 + 20 * 65536;
  const used1 = 743;
  const shuffled = Array.from({length: 1021}, (_, i) => i).sort(() => Math.random() - 0.5);
  for (let i = 0; i < used1; i++) {
    const n = base1 + 2 + shuffled[i]; // skip network + gateway
    const b = [(n>>24)&255,(n>>16)&255,(n>>8)&255,n&255];
    const ip = b.join('.');
    const user = sampleUsernames[i % sampleUsernames.length] + (i > 25 ? String(Math.floor(i/26)) : '');

    const daysAgo = Math.floor(Math.random() * 60);
    out.push({
      id: `p1-${i}`, pool_id: 1, ip, username: user, realm, attr_key: 'VPN-IP',
      synced_at: formatAgo(daysAgo * 86400 * 1000 + Math.random() * 86400 * 1000),
      _sort: Date.now() - daysAgo * 86400000,
    });
  }
  // Pool 2 — light usage
  const base2 = 10 * 16777216 + 88 * 65536 + 16 * 256;
  for (let i = 0; i < 38; i++) {
    const n = base2 + 2 + i * 3;
    const b = [(n>>24)&255,(n>>16)&255,(n>>8)&255,n&255];
    out.push({
      id: `p2-${i}`, pool_id: 2, ip: b.join('.'),
      username: 'cntr-' + (i+101), realm: 'contractors', attr_key: 'VPN-IP-CNTR',
      synced_at: formatAgo(Math.random() * 7 * 86400000),
      _sort: Date.now() - Math.random() * 7 * 86400000,
    });
  }
  // Pool 3 — moderate
  const base3 = 10 * 16777216 + 42 * 65536;
  for (let i = 0; i < 212; i++) {
    const n = base3 + 2 + i;
    const b = [(n>>24)&255,(n>>16)&255,(n>>8)&255,n&255];
    out.push({
      id: `p3-${i}`, pool_id: 3, ip: b.join('.'),
      username: sampleUsernames[(i + 7) % sampleUsernames.length],
      realm: 'ldap.eu', attr_key: 'VPN-IP-EU',
      synced_at: formatAgo(Math.random() * 30 * 86400000),
      _sort: Date.now() - Math.random() * 30 * 86400000,
    });
  }
  // Pool 4 — mostly empty
  for (let i = 0; i < 7; i++) {
    out.push({
      id: `p4-${i}`, pool_id: 4, ip: '192.168.200.' + (2 + i*3),
      username: 'labuser' + i, realm: 'lab', attr_key: 'LAB-IP',
      synced_at: formatAgo(Math.random() * 3 * 86400000),
      _sort: Date.now() - Math.random() * 3 * 86400000,
    });
  }
  return out;
}

function formatAgo(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 60) return `${s}s ago`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  const d = Math.floor(h / 24);
  return `${d}d ago`;
}

// Subnet visualizer — grid of dots, one per host. Scales to fit.
const SubnetGrid = ({ total, used, gateway = 1, onHover, hoverIndex, compact, maxCells = 1024 }) => {
  const shown = Math.min(total, maxCells);
  const cols = compact ? Math.ceil(Math.sqrt(shown * 2.5)) : Math.ceil(Math.sqrt(shown * 3));
  const rows = Math.ceil(shown / cols);
  // Pre-compute which cells are 'used' — deterministic scatter
  const usedSet = React.useMemo(() => {
    const set = new Set();
    // Cluster used cells near the start (realistic: low-numbered IPs fill first)
    let i = 0;
    let filled = 0;
    const skipInterval = Math.max(1, Math.round(shown / Math.max(1, used + 1)));
    while (filled < Math.min(used, shown - gateway) && i < shown) {
      if (i !== 0 && Math.random() < 0.8) set.add(i);
      i++;
      if (set.size > filled) filled = set.size;
    }
    // Ensure count matches
    while (set.size < Math.min(used, shown - gateway)) {
      const n = Math.floor(Math.random() * (shown - 1)) + 1;
      set.add(n);
    }
    return set;
  }, [shown, used, gateway]);
  return (
    <div className="subnet-viz" style={{ gridTemplateColumns: `repeat(${cols}, 1fr)` }}>
      {Array.from({ length: shown }, (_, i) => {
        const cls = i === 0 ? 'gw' : usedSet.has(i) ? 'used' : '';
        const hov = hoverIndex === i ? 'hover' : '';
        return <div key={i} className={`cell ${cls} ${hov}`}
          onMouseEnter={onHover ? () => onHover(i) : undefined}
        />;
      })}
    </div>
  );
};

// Sortable table helper
const useSort = (rows, initial = null) => {
  const [sort, setSort] = React.useState(initial);
  const sorted = React.useMemo(() => {
    if (!sort) return rows;
    const sign = sort.dir === 'asc' ? 1 : -1;
    return [...rows].sort((a, b) => {
      const av = a[sort.key], bv = b[sort.key];
      if (typeof av === 'number') return (av - bv) * sign;
      return String(av || '').localeCompare(String(bv || '')) * sign;
    });
  }, [rows, sort]);
  const onClick = (key) => {
    setSort((s) => {
      if (!s || s.key !== key) return { key, dir: 'asc' };
      if (s.dir === 'asc') return { key, dir: 'desc' };
      return null;
    });
  };
  return { sorted, sort, onSort: onClick };
};

const SortHead = ({ sort, onSort, k, children, align }) => {
  const is = sort && sort.key === k;
  return (
    <th className={`sortable ${is ? 'sorted' : ''}`} onClick={() => onSort(k)} style={{ textAlign: align }}>
      {children}
      <span className="sort-ico">{is ? (sort.dir === 'asc' ? '↑' : '↓') : '↕'}</span>
    </th>
  );
};

const PoolDetail = ({ pool, allocations, pools, setRoute, onAllocate, onRelease, onDelete, realms, usernames }) => {
  const { Icons, Badge, Progress, SubnetGrid, Mono, StatusDot, useSort, SortHead, Modal } = window;

  const [form, setForm] = React.useState({ realm: '', username: '', ip: '' });
  const [q, setQ] = React.useState('');
  const [confirmDel, setConfirmDel] = React.useState(false);
  const [confirmRel, setConfirmRel] = React.useState(null);
  const [hover, setHover] = React.useState(-1);

  const used = allocations.length;
  const total = pool.total;
  const free = total - used;
  const pct = Math.round(used / total * 100);

  const filtered = allocations.filter(a => {
    if (!q) return true;
    const s = q.toLowerCase();
    return a.ip.includes(s) || a.username.toLowerCase().includes(s) || a.realm.toLowerCase().includes(s);
  });
  const { sorted, sort, onSort } = useSort(filtered, { key: '_sort', dir: 'desc' });

  // Generate free IPs list
  const usedSet = new Set(allocations.map(a => a.ip));
  const freeIps = [];
  const parts = pool.cidr.split('/');
  const bits = parseInt(parts[1]);
  const baseParts = parts[0].split('.').map(Number);
  const base = (baseParts[0]<<24) + (baseParts[1]<<16) + (baseParts[2]<<8) + baseParts[3];
  const size = Math.pow(2, 32 - bits);
  for (let i = 1; i < size - 1 && freeIps.length < 50; i++) {
    const n = base + i;
    const ip = [(n>>>24)&255,(n>>16)&255,(n>>8)&255,n&255].join('.');
    if (ip === pool.gateway) continue;
    if (!usedSet.has(ip)) freeIps.push(ip);
  }

  const submit = (e) => {
    e.preventDefault();
    if (!form.realm || !form.username) return;
    onAllocate({ ...form, ip: form.ip || freeIps[0] });
    setForm({ realm: form.realm, username: '', ip: '' });
  };

  return (
    <>
      <div className="page-head">
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4 }}>
            <a className="mut sm" onClick={() => setRoute({ name: 'pools' })} style={{ cursor: 'pointer' }}>
              ← Pools
            </a>
          </div>
          <h1 className="page-title">
            <StatusDot tone={pct > 90 ? 'bad' : pct > 70 ? 'warn' : 'ok'}/>
            {pool.name}
            <span className="mono-sub">{pool.cidr}</span>
          </h1>
          <div className="page-sub">{pool.description || 'No description.'}</div>
        </div>
        <div className="page-actions">
          <button className="btn ghost"><Icons.Pencil className="ico"/> Edit</button>
          <button className="btn danger" onClick={() => setConfirmDel(true)}>
            <Icons.Trash className="ico"/> Delete
          </button>
        </div>
      </div>

      <div className="stats" style={{ gridTemplateColumns: 'repeat(4, 1fr)' }}>
        <div className="stat">
          <div className="stat-label">Allocated</div>
          <div className="stat-value">{used.toLocaleString()}</div>

const CommandPalette = ({ open, onClose, pools, setRoute, onSync, onToggleTheme }) => {
  const { Icons } = window;
  const [q, setQ] = React.useState('');
  const [sel, setSel] = React.useState(0);
  const inputRef = React.useRef(null);

  React.useEffect(() => { if (open) { setQ(''); setSel(0); setTimeout(() => inputRef.current?.focus(), 50); } }, [open]);

  const items = React.useMemo(() => {
    const base = [
      { group: 'Navigate', label: 'Overview', ico: Icons.Dashboard, action: () => setRoute({ name: 'dashboard' }), kbd: 'G O' },
      { group: 'Navigate', label: 'All pools', ico: Icons.Pools, action: () => setRoute({ name: 'pools' }), kbd: 'G P' },
      { group: 'Navigate', label: 'All allocations', ico: Icons.Network, action: () => setRoute({ name: 'allocations' }), kbd: 'G A' },
      { group: 'Navigate', label: 'Sync history', ico: Icons.Sync, action: () => setRoute({ name: 'sync' }), kbd: 'G S' },
      { group: 'Actions', label: 'Sync now', ico: Icons.Zap, action: () => onSync() },
      { group: 'Actions', label: 'Create new pool', ico: Icons.Plus, action: () => setRoute({ name: 'pool_new' }) },
      { group: 'Actions', label: 'Toggle theme', ico: Icons.Sliders, action: onToggleTheme },
    ];
    pools.forEach(p => base.push({
      group: 'Jump to pool',
      label: `${p.name}  ${p.cidr}`,
      ico: Icons.Pools,
      action: () => setRoute({ name: 'pool_detail', id: p.id }),
    }));
    if (!q) return base;
    const s = q.toLowerCase();
    return base.filter(i => i.label.toLowerCase().includes(s));
  }, [q, pools]);

  React.useEffect(() => { setSel(0); }, [q]);

  const onKey = (e) => {
    if (e.key === 'ArrowDown') { e.preventDefault(); setSel(s => Math.min(items.length - 1, s + 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setSel(s => Math.max(0, s - 1)); }
    else if (e.key === 'Enter' && items[sel]) { e.preventDefault(); items[sel].action(); onClose(); }
    else if (e.key === 'Escape') { onClose(); }
  };

  if (!open) return null;

  // Group items
  const groups = {};
  items.forEach((it, i) => { (groups[it.group] = groups[it.group] || []).push({ ...it, _i: i }); });

  return (
    <div className="palette-backdrop" onClick={onClose}>
      <div className="palette" onClick={e => e.stopPropagation()}>
        <input ref={inputRef} className="palette-input" placeholder="Search pools, actions, pages…"
          value={q} onChange={e => setQ(e.target.value)} onKeyDown={onKey}/>
        <div style={{ maxHeight: 360, overflow: 'auto' }}>
          {items.length === 0 && <div className="palette-empty">No results</div>}
          {Object.entries(groups).map(([g, list]) => (
            <div key={g}>
              <div className="palette-section">{g}</div>
              {list.map(it => (
                <div key={it._i} className={`palette-item ${sel === it._i ? 'active' : ''}`}
                  onMouseEnter={() => setSel(it._i)}
                  onClick={() => { it.action(); onClose(); }}>
                  <it.ico className="ico"/>
                  <span>{it.label}</span>
                  {it.kbd && <span className="kbd">{it.kbd}</span>}
                </div>
              ))}
            </div>
          ))}
        </div>
        <div className="palette-foot">
          <span><span className="k">↑</span><span className="k">↓</span> navigate</span>
          <span><span className="k">↵</span> select</span>
          <span><span className="k">esc</span> close</span>
        </div>
      </div>
    </div>
  );
};

window.CommandPalette = CommandPalette;

// ===== src/app.jsx =====
const { useState, useEffect, useMemo } = React;

function App() {
  const { Icons, Sidebar, Dashboard, PoolsList, PoolNew, PoolDetail, AllocationsList, SyncPage, CommandPalette, Tweaks, TWEAK_DEFAULTS } = window;
  const { initialPools, makeAllocations, sampleUsernames, sampleRealms, syncLogs } = window.mockData;

  // Persist route across reloads for iterative design
  const [route, setRouteState] = useState(() => {
    try { return JSON.parse(localStorage.getItem('vp.route')) || { name: 'dashboard' }; }
    catch { return { name: 'dashboard' }; }
  });
  const setRoute = (r) => { setRouteState(r); try { localStorage.setItem('vp.route', JSON.stringify(r)); } catch {} };

  const [collapsed, setCollapsed] = useState(false);
  const [pools, setPools] = useState(initialPools);
  const [allocations, setAllocations] = useState(() => makeAllocations());
  const [logs, setLogs] = useState(syncLogs);
  const [syncing, setSyncing] = useState(false);
  const [toasts, setToasts] = useState([]);
  const [paletteOpen, setPaletteOpen] = useState(false);

  // Tweaks state
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);

  useEffect(() => {
    document.body.classList.toggle('collapsed', collapsed);
    document.body.classList.toggle('light', tweaks.theme === 'light');
    document.body.classList.toggle('dense', tweaks.density === 'dense');
    document.documentElement.style.setProperty('--accent-h', tweaks.accentHue);
  }, [collapsed, tweaks]);

  // Edit-mode bridge
  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setTweaksVisible(true);
      else if (d.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const applyTweak = (patch) => {
    setTweaks(v => {
      const next = { ...v, ...patch };
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
      return next;
    });
  };

  // Keyboard
  useEffect(() => {
    let gKey = false;
    const handler = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); setPaletteOpen(p => !p); return; }
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
      if (e.key === '/') { e.preventDefault(); setPaletteOpen(true); return; }
      if (e.key.toLowerCase() === 'g') { gKey = true; setTimeout(() => { gKey = false; }, 800); return; }
      if (gKey) {
        if (e.key === 'o') { setRoute({ name: 'dashboard' }); gKey = false; }
        if (e.key === 'p') { setRoute({ name: 'pools' }); gKey = false; }
        if (e.key === 'a') { setRoute({ name: 'allocations' }); gKey = false; }
        if (e.key === 's') { setRoute({ name: 'sync' }); gKey = false; }
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  const addToast = (t) => {
    const id = Math.random().toString(36).slice(2);
    setToasts(ts => [...ts, { id, ...t }]);
    setTimeout(() => setToasts(ts => ts.filter(x => x.id !== id)), 3800);
  };

  const doSync = () => {
    setSyncing(true);
    setTimeout(() => {
      const now = new Date();
      const fmt = (d) => d.toISOString().slice(0, 19).replace('T', ' ');
      const newLog = {
        id: Date.now(),
        started: fmt(now),
        finished: fmt(new Date(now.getTime() + 8000)),
        status: 'success',
        details: `Found ${allocations.length} allocation(s) across ${sampleRealms.length} realm(s)`,
      };
      setLogs(l => [newLog, ...l]);
      setSyncing(false);
      addToast({ tone: 'ok', title: 'Sync complete', detail: newLog.details });
    }, 1400);
  };

  const allocate = (poolId, { realm, username, ip }) => {
    const pool = pools.find(p => p.id === poolId);
    const id = `new-${Date.now()}`;
    const alloc = {
      id, pool_id: poolId, ip, username, realm,
      attr_key: pool.attr_key, synced_at: 'just now', _sort: Date.now(),
    };
    setAllocations(a => [...a, alloc]);
    addToast({ tone: 'ok', title: `IP ${ip} allocated`, detail: `${username}@${realm} → ${pool.name}` });
  };
  const release = (alloc) => {
    setAllocations(a => a.filter(x => x.id !== alloc.id));
    addToast({ tone: 'info', title: `Released ${alloc.ip}`, detail: `${alloc.username}@${alloc.realm}` });
  };
  const createPool = (form) => {
    const id = Math.max(...pools.map(p => p.id)) + 1;
    const bits = parseInt(form.cidr.split('/')[1] || '24');
    const total = Math.max(0, Math.pow(2, 32 - bits) - 2 - (form.gateway ? 1 : 0));
    setPools(p => [...p, { id, ...form, total, created: new Date().toISOString().slice(0, 10) }]);
    addToast({ tone: 'ok', title: 'Pool created', detail: `${form.name} · ${form.cidr}` });
  };
  const deletePool = (id) => {
    setPools(p => p.filter(x => x.id !== id));
    setAllocations(a => a.filter(x => x.pool_id !== id));
    addToast({ tone: 'info', title: 'Pool deleted' });
    setRoute({ name: 'pools' });
  };

  const lastSync = logs[0];

  // Render current page
  let page;
  if (route.name === 'dashboard') {
    page = <Dashboard pools={pools} allocations={allocations} lastSync={lastSync}
      setRoute={setRoute} onSync={doSync} syncing={syncing}/>;
  } else if (route.name === 'pools') {
    page = <PoolsList pools={pools} allocations={allocations} setRoute={setRoute}/>;
  } else if (route.name === 'pool_new') {
    page = <PoolNew onCreate={createPool} setRoute={setRoute}/>;
  } else if (route.name === 'allocations') {
    page = <AllocationsList pools={pools} allocations={allocations} setRoute={setRoute} onRelease={release}/>;
  } else if (route.name === 'pool_detail') {
    const pool = pools.find(p => p.id === route.id) || pools[0];
    const poolAllocs = allocations.filter(a => a.pool_id === pool.id);
    page = <PoolDetail pool={pool} allocations={poolAllocs} pools={pools} setRoute={setRoute}
      onAllocate={(f) => allocate(pool.id, f)}
      onRelease={release}
      onDelete={() => deletePool(pool.id)}
      realms={sampleRealms} usernames={sampleUsernames}/>;
  } else if (route.name === 'sync') {
    page = <SyncPage logs={logs} onSync={doSync} syncing={syncing} lastSync={lastSync}/>;
  }

  // Crumbs
  const crumbs = [];
  if (route.name === 'dashboard') crumbs.push('Overview');
  else if (route.name === 'pools') crumbs.push('Pools');
  else if (route.name === 'pool_new') { crumbs.push('Pools'); crumbs.push('New'); }
  else if (route.name === 'pool_detail') {
    crumbs.push('Pools');
    const p = pools.find(x => x.id === route.id);
    crumbs.push(p?.name || '—');
  }
  else if (route.name === 'allocations') crumbs.push('Allocations');
  else if (route.name === 'sync') crumbs.push('Sync');

  return (
    <div className="app">
      <Sidebar route={route} setRoute={setRoute} collapsed={collapsed} setCollapsed={setCollapsed}
        pools={pools} allocations={allocations} onPalette={() => setPaletteOpen(true)}/>
      <div className="main">
        <div className="topbar">
          <div className="crumbs">
            <Icons.Network size={14} style={{ color: 'var(--mut)' }}/>
            <span className="ghost">pooler</span>
            {crumbs.map((c, i) => (
              <React.Fragment key={i}>
                <span className="sep">/</span>
                <span className={i === crumbs.length - 1 ? 'cur' : 'ghost'}>{c}</span>
              </React.Fragment>
            ))}
          </div>
          <span className="spacer"/>
          <div className="env-pill">
            <span className="dot"/> pi.corp.local
          </div>
          <button className="search" onClick={() => setPaletteOpen(true)}>
            <Icons.Search className="ico"/>
            <span>Search pools, IPs, users…</span>
            <span className="kbd">{navigator.platform.indexOf('Mac') >= 0 ? '⌘K' : 'Ctrl K'}</span>
          </button>
          <button className="btn ghost sm" title="Logout">
            <Icons.Logout className="ico"/>
          </button>
        </div>
        <div className="content">{page}</div>
      </div>

      <CommandPalette open={paletteOpen} onClose={() => setPaletteOpen(false)}
        pools={pools} setRoute={setRoute} onSync={doSync}
        onToggleTheme={() => applyTweak({ theme: tweaks.theme === 'dark' ? 'light' : 'dark' })}/>

      <Tweaks visible={tweaksVisible} values={tweaks}
        onChange={applyTweak} onClose={() => setTweaksVisible(false)}/>

      {toasts.length > 0 && (
        <div className="toasts">
          {toasts.map(t => (
            <div key={t.id} className={`toast ${t.tone || 'info'}`}>
              <span className="dot"/>
              <div>
                <b>{t.title}</b>
                {t.detail && <span>{t.detail}</span>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);



  </script>
</body>
</html>
