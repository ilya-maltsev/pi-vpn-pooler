services:
  app:
    build:
      context: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PI_API_URL: ${PI_API_URL:-https://host.docker.internal:8443}
      PI_VERIFY_SSL: ${PI_VERIFY_SSL:-false}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-changeme}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://localhost:5443}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
      POOLS_FILE: /app/data/pools.yaml
    volumes:
      - staticfiles:/app/staticfiles
      - pooldata:/app/data
    restart: always

  reverse_proxy:
    image: nginx:1.27-alpine
    environment:
      SERVERNAME: ${SERVERNAME:-localhost}
      APP_PORT: 8000
    ports:
      - "${PROXY_PORT:-5443}:443"
    volumes:
      - ./templates/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./templates/pi.pem:/etc/nginx/ssl/pi.pem:ro
      - ./templates/pi.key:/etc/nginx/ssl/pi.key:ro
      - staticfiles:/app/staticfiles:ro
    depends_on:
      - app
    restart: always

volumes:
  pooldata: {}
  staticfiles: {}
