services:
  app:
    build:
      context: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PI_API_URL: https://host.docker.internal:8443
      PI_VERIFY_SSL: "false"
      PI_REQUIRE_OTP: "false"
      DJANGO_SECRET_KEY: dev-secret-key-not-for-production
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "*"
      POOLS_FILE: /app/data/pools.yaml
    ports:
      - "5000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
    command: python manage.py runserver 0.0.0.0:8000
