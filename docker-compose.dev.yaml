services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vpn_pooler
      POSTGRES_USER: vpn_pooler
      POSTGRES_PASSWORD: vpn_pooler
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn_pooler"]
      interval: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_NAME: vpn_pooler
      DB_USER: vpn_pooler
      DB_PASSWORD: vpn_pooler
      DB_HOST: db
      DB_PORT: 5432
      PI_API_URL: https://host.docker.internal:8443
      PI_VERIFY_SSL: "false"
      DJANGO_SECRET_KEY: dev-secret-key-not-for-production
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "*"
      BIND_ADDRESS: 0.0.0.0:8000
    ports:
      - "5000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"

volumes:
  pgdata: {}
